<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }
    .badge {
      display: inline-block;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    h1 { font-size: 26px; color: #1e293b; margin-bottom: 6px; }
    .sub { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; }
    tr:nth-child(even) td { background: #f8fafc; }
    td {
      padding: 13px 16px;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      color: #334155;
    }
    td:first-child {
      font-weight: 700;
      color: #1e293b;
      width: 42%;
      background: #f1f5f9 !important;
    }
    .gb {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 800;
      font-size: 15px;
      padding: 3px 14px;
      border-radius: 5px;
    }
    .pb {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
    }
    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">☁ Deployed on Render.com — PaaS</div>
    <h1>🎓 Student Information </h1>
    <p class="sub">Web App on PaaS</p>
    <table>
      <tr><td>Name</td><td>Bharat singh</td></tr>
      <tr><td>Roll No</td><td>4316</td></tr>
      <tr><td>Department</td><td>Information technology</td></tr>
      <tr><td>Year</td><td>third Year</td></tr>
      <tr><td>CGPA</td><td>7.75 / 10.0</td></tr>
      <tr><td>Grade</td><td><span class="gb">A</span></td></tr>
      <tr><td>Platform</td><td><span class="pb">Render.com (PaaS)</span></td></tr>
      <tr><td>Service Model</td><td>Platform as a Service (PaaS)</td></tr>
    </table>
    <div class="footer">Node.js  |  render.com  |  Cloud Computing Lab</div>
  </div>
</body></html>
